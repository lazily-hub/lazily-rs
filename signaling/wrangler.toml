name = "lazily-signaling"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# One Durable Object instance per session id brokers that session's roster.
[[durable_objects.bindings]]
name = "SIGNALING_ROOM"
class_name = "SignalingRoom"

[[migrations]]
tag = "v1"
new_classes = ["SignalingRoom"]

[vars]
# "open" (any peer may join/signal) or "allowlist" (#39c5 default-deny).
SIGNALING_MODE = "open"
