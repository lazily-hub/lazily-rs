[package]
name = "lazily"
version = "0.5.1"
edition = "2024"
description = "Lazy reactive signals with dependency tracking and cache invalidation"
license = "MIT"
repository = "https://github.com/btakita/lazily-rs"
keywords = ["reactive", "signals", "lazy", "dependency-tracking", "cache"]
categories = ["data-structures"]

[features]
default = ["smallvec"]
instrumentation = []
loom = []
tokio = ["dep:tokio"]
vec_edges = []

[dependencies]
smallvec = { version = "1", optional = true }
tokio = { version = "1", optional = true, default-features = false, features = ["macros", "rt-multi-thread"] }

[dev-dependencies]
criterion = "0.8"
loom = "0.7"

[[example]]
name = "tokio_sync"
required-features = ["tokio"]

[[example]]
name = "instrumentation_profile"
required-features = ["instrumentation"]

[[bench]]
name = "context"
harness = false

[[bench]]
name = "profile"
harness = false
required-features = ["instrumentation"]
