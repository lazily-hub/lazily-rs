[package]
name = "lazily"
version = "0.10.3"
edition = "2024"
description = "Lazy reactive signals with dependency tracking and cache invalidation"
license = "MIT"
repository = "https://github.com/btakita/lazily-rs"
keywords = ["reactive", "signals", "lazy", "dependency-tracking", "cache"]
categories = ["data-structures"]
# The signaling/ subtree is a standalone TypeScript Cloudflare Worker + client,
# not part of the Rust crate; keep it out of the published package.
exclude = ["signaling/"]

[lib]
crate-type = ["lib", "cdylib"]

[features]
async = ["dep:tokio"]
default = ["smallvec"]
distributed = []
ffi = ["ipc", "dep:serde_json"]
instrumentation = []
ipc = ["serde"]
ipc-binary = ["ipc", "dep:postcard"]
loom = []
serde = ["dep:serde", "smallvec?/serde"]
# #jpf1: WebRTC DataChannel IPC transport — abstraction layer (sync IpcSink/Source
# bridge + permission filtering + in-memory loopback). The concrete webrtc-rs/str0m
# backend is an additive follow-up; this feature stays dependency-light.
webrtc = ["ipc", "dep:serde_json"]
# Async client for the #yxjw Cloudflare signaling endpoint, so a Rust project
# (e.g. agent-doc) can depend on lazily-rs for distributed peer discovery (#s0fc).
signaling-client = ["distributed", "serde", "dep:serde_json", "dep:tokio", "dep:tokio-tungstenite", "dep:futures-util"]
std_sync_mutex = []
tokio = ["dep:tokio"]
vec_edges = []

[dependencies]
arc-swap = "1"
futures-util = { version = "0.3", optional = true, default-features = false, features = ["sink", "std"] }
parking_lot = "0.12"
postcard = { version = "1", optional = true, features = ["alloc"] }
serde = { version = "1", optional = true, features = ["derive"] }
serde_json = { version = "1", optional = true }
smallvec = { version = "1", optional = true }
tokio = { version = "1", optional = true, default-features = false, features = ["macros", "rt-multi-thread", "sync", "time", "net", "io-util"] }
tokio-tungstenite = { version = "0.24", optional = true, features = ["rustls-tls-webpki-roots"] }

[dev-dependencies]
criterion = "0.8"
loom = "0.7"
proptest = "1"
serde_json = "1"

[[example]]
name = "tokio_sync"
required-features = ["tokio"]

[[example]]
name = "instrumentation_profile"
required-features = ["instrumentation"]

[[bench]]
name = "context"
harness = false

[[bench]]
name = "profile"
harness = false
required-features = ["instrumentation"]

[[bench]]
name = "async_context"
harness = false
required-features = ["async"]

[[bench]]
name = "tokio_sync"
harness = false
required-features = ["tokio"]
