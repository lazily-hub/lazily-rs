[defines]
"feature = ffi" = "LAZILY_FFI"

language = "C"
include_guard = "LAZILY_H"
autogen_warning = "/* Warning: this file is auto-generated by cbindgen. Do not modify. */"
tab_width = 4
style = "both"

[export]
include = [
    "LazilyFfiStatus",
    "LazilyFfiMessageKind",
    "LazilyFfiBytes",
]

[fn]
prefix = "lazily_"

[struct]
rename_fields = "SnakeCase"

[enum]
prefix_with_name = true
rename_variants = "SnakeCase"
